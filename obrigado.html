<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doação confirmada · Solenari Care</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:linear-gradient(135deg,#fef9e7 0%,#fde68a 100%);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:1.5rem;color:#1f2937}
    .card{background:white;padding:3rem 2rem;border-radius:16px;
      box-shadow:0 20px 50px -10px rgba(0,0,0,0.15);
      text-align:center;max-width:480px;width:100%}
    .icon{width:88px;height:88px;border-radius:50%;background:#dcfce7;
      color:#16a34a;display:flex;align-items:center;justify-content:center;
      margin:0 auto 1.5rem;font-size:3rem;font-weight:700}
    h1{font-size:1.65rem;font-weight:700;margin-bottom:0.75rem;color:#EBA512}
    p{color:#4b5563;font-size:1rem;margin-bottom:1rem;line-height:1.6}
    a.cta{display:inline-block;margin-top:0.75rem;padding:0.85rem 1.75rem;
      background:linear-gradient(135deg,#22C1C3,#1a9b9d);color:white;
      text-decoration:none;border-radius:8px;font-weight:700;font-size:0.95rem;
      box-shadow:0 4px 12px rgba(34,193,195,0.35)}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Doação confirmada!</h1>
    <p>Muito obrigado por ajudares o Lucas. A tua contribuição faz uma diferença real na luta dele contra o cancro.</p>
    <p style="font-size:0.875rem;color:#9ca3af;">Em breve receberás por e-mail o comprovativo da doação.</p>
    <a href="/" class="cta">Voltar ao início</a>
  </div>
</body>
</html>
